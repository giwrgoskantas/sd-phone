name: Bug Report
description: Something isn't working as expected
title: "fix: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please provide as much information as possible so that we can get this resolved efficiently.

  - type: input
    id: area
    attributes:
      label: Affected area
      description: Which app or part of the phone is affected? Say 'whole phone' or 'not sure' if it isn't tied to one.
      placeholder: "e.g.: Mail app, lockscreen, startup / database, ESX integration"
    validations:
      required: true

  - type: dropdown
    id: framework
    attributes:
      label: Framework
      options:
        - QBCore/QBox
        - ESX
        - Custom/Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What's broken
      description: Plain description of the bug
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered steps, be specific enough that you could hand this to someone else
      placeholder: |
        1. Receive a new text message from another player
        2. Attempt to open the text conversation
        3. Nothing happens

  - type: textarea
    id: logs
    attributes:
      label: Console errors / logs
      description: Paste any server or client console output. Use a code block.
      render: shell

  - type: textarea
    id: evidence
    attributes:
      label: Screenshots or clips
      description: Drag and drop images/video here if you have them