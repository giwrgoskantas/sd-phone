version: 2
updates:
  # Frontend npm tree (web/package.json + lockfile). Monthly, one grouped PR
  # instead of a PR per package.
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      npm-dependencies:
        patterns:
          - "*"
    # Majors (React, Tailwind, Vite...) are migration projects, not routine
    # bumps; they stay manual.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Marketplace actions used by ci.yml and release.yml.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      actions:
        patterns:
          - "*"
